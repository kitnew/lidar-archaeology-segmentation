defaults:
  - _self_
  - dataset: test21
  - model: deeplabv3/resnet101
  - paths: default

# Inference settings
checkpoint_path: null
output_path: "${paths.output_dir}/full_prediction_map.npy"
threshold: 0.5
batch_size: 64
num_workers: 8

# Hydra overrides
hydra:
  run:
    dir: ${paths.output_dir}/inference/${now:%Y-%m-%d}/${now:%H-%M-%S}
