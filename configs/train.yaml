defaults:
  - _self_
  - dataset: rgb
  - model: deeplabv3/resnet101_pretrained
  - loss: bcedice
  - paths: default
  - logger: default

# Training parameters
epochs: 25
batch_size: 16
num_workers: 32
learning_rate: 1e-4
weight_decay: 0.0

threshold: 0.81

# Experiment level settings
seed: 42

# Optimizer
optimizer:
  _target_: torch.optim.Adam
  lr: ${learning_rate}
  weight_decay: ${weight_decay}

# Hydra settings
hydra:
  run:
    dir: ${paths.output_dir}/${now:%Y-%m-%d}/${now:%H-%M-%S}
