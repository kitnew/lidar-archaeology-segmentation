# RGB Dataset Configuration

tile_size: 128
stride: 32

train:
  _target_: datasets.rgb_dataset.RGBTilesDataset
  rgb_path: "${paths.data_dir}/RGB0.80(4)_normalized_train.npz"
  mask_path: "${paths.data_dir}/mounds_mask0.80(4)_shadowed_train.npy"
  tile_size: ${..tile_size}
  stride: ${..stride}
  pos_only: true
  transforms: true
  no_gt: false

val:
  _target_: datasets.rgb_dataset.RGBTilesDataset
  rgb_path: "${paths.data_dir}/RGB0.80(4)_normalized_val.npz"
  mask_path: "${paths.data_dir}/mounds_mask0.80(4)_shadowed_val.npy"
  tile_size: ${..tile_size}
  stride: ${..stride}
  pos_only: true
  transforms: false
  no_gt: false

full:
  _target_: datasets.rgb_dataset.RGBTilesDataset
  rgb_path: "${paths.data_dir}/RGB_normalized.npz"
  mask_path: "${paths.data_dir}/mounds_mask_shadowed.npy"
  tile_size: ${..tile_size}
  stride: ${..stride}
  pos_only: false
  transforms: false
  no_gt: false
